<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Escolha sua unidade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
        display: flex;
        flex-direction: column;
      font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
      background: linear-gradient(#17171B,#0B0B0D);
      color: white;
      display: flex;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 2rem 1rem 0rem;
      font-size: large;
    }

    .container {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
    }

    .btn {
      padding: 10px 25px 5px;
      width: 100;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
      background: linear-gradient(#3d3d3f6e,#60606869);
      color: white;
      border: 1px solid;
      border-color: rgba(255, 255, 255, 0.185);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

    }

    .btn:hover {
      background: #595c61;
    }



    .action-btn {
        display: flex;
        flex-direction: row;
        gap: 10px;
        background: linear-gradient(#0000009d,#35353591);
        color: white;
        font-weight: bold;
        padding: 5px;
        width: 100%;
        margin-bottom: 1rem;
        font-size: large;
        border-radius: 1rem;
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    }

    .action-btn:hover {
      background: #303235;
      color: white;
    }

    .loading {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
      align-self: center;
    }

    .distance {
      font-size: 13px;
      color: #cbd5f5;
      margin-top: 5px;
    }

    .highlight {
      /*background: #22c55e !important;*/
      border: 2px solid #22c55e;
      color: #000000;
    }

    .btn-img {
        width: 300px;
    }

    .icon{
        height: 20px;
    }

    span{
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    @media only screen and (min-width: 950px){
    
    .container{
        width: 500px;
    }
}
  </style>
</head>

<body>
    <img style="width: 250px; margin-bottom: 4rem;" src="assets/titulo cabrones.svg" alt=""/>
  <div class="container">

    <span>
        <img class="icon" src="assets/search.svg" alt="search">
        Verifique qual a unidade mais próxima!
    </span>

    <button id="geoBtn" class="btn action-btn">
        <img style="height: 15px;" src="assets/location.svg" alt="location">
      Usar minha localização
    </button>

    <a id="loja1" class="btn" href="https://hamburgueriacabrones.com.br/cabrones_hamburgueria">
      <img class="btn-img" src="assets/brisamar.svg" alt="brisamar">
      <div id="dist1" class="distance"></div>
    </a>

    <a id="loja2" class="btn" href="https://app.cardapioweb.com/cabrones_hamburgueria__2">
      <img class="btn-img" src="assets/zonasul.svg" alt="zonasul">
      <div id="dist2" class="distance"></div>
    </a>

    <div id="status" class="loading" ></div>

    <span>
        <img class="icon" src="assets/support.svg" alt="support">
        Suporte online para dúvidas:
    </span>

    <a id="loja1" class="btn" href="http://wa.me/5583988519090">
        <span style="padding-bottom: 5px;">
            <img style="height: 15px;" src="assets/whatsapp.svg" alt="whatsapp">
            Unidade BRISAMAR
        </span>
    </a>

    <a id="loja2" class="btn" href="http://wa.me/5583981746884">
        <span style="padding-bottom: 5px;">
            <img style="height: 15px;" src="assets/whatsapp.svg" alt="whatsapp">
            Unidade ZONA SUL
        </span>
    </a>
  </div>

  <script>
    const loja1 = { lat: -7.111623734753553, lon: -34.841415976983 };
    const loja2 = { lat: -7.176183672854079, lon: -34.868770442799 };

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    document.getElementById("geoBtn").addEventListener("click", function() {
      const status = document.getElementById("status");
      status.innerText = "Detectando sua localização...";

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          function(position) {
            const userLat = position.coords.latitude;
            const userLon = position.coords.longitude;

            const dist1 = calcularDistancia(userLat, userLon, loja1.lat, loja1.lon);
            const dist2 = calcularDistancia(userLat, userLon, loja2.lat, loja2.lon);

            // Mostrar distâncias
            document.getElementById("dist1").innerText = dist1.toFixed(2) + " km de você";
            document.getElementById("dist2").innerText = dist2.toFixed(2) + " km de você";

            // Reset highlight
            document.getElementById("loja1").classList.remove("highlight");
            document.getElementById("loja2").classList.remove("highlight");

            // Destacar mais próxima
            if (dist1 < dist2) {
              document.getElementById("loja1").classList.add("highlight");
              status.innerText = "Unidade mais próxima destacada";
            } else {
              document.getElementById("loja2").classList.add("highlight");
              status.innerText = "Unidade mais próxima destacada";
            }
          },
          function() {
            status.innerText = "Não foi possível acessar sua localização.";
          }
        );
      } else {
        status.innerText = "Geolocalização não suportada.";
      }
    });
  </script>
</body>
</html>
